apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-pipeline
  namespace: telemetry

spec:
  replicas: 2

  selector:
    matchLabels:
      app: telemetry-pipeline

  template:
    metadata:
      labels:
        app: telemetry-pipeline

    spec:
      containers:
      - name: nginx
        image: nginx:latest

        ports:
        - containerPort: 80
